server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "home.arpa"
    data_dir = "/opt/spire/data"
    log_level = "DEBUG"
    ca_ttl = "168h"
    default_x509_svid_ttl = "48h"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/opt/spire/data/datastore.sqlite3"
        }
    }

    KeyManager "memory" {
        plugin_data {}
    }

    NodeAttestor "x509pop" {
        plugin_data {
            ca_bundle_path = "/certs/ca.pem"
        }
    }
}
