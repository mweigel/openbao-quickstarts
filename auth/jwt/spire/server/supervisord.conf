[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/var/run/supervisord.pid

[program:create-certs]
command=/usr/local/bin/create-certs.sh
user=root
autostart=true
autorestart=false
startretries=0
exitcodes=0

[program:spire-server]
command=/usr/local/bin/start-spire-server.sh
user=spire
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:oidc-provider]
command=oidc-discovery-provider -config /opt/spire/config/oidc-discovery-provider.conf
user=spire
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0