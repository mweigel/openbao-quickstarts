networks:
  default:
    name: openbao-quickstarts

services:
  postgres:
    container_name: postgres
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: postgres
      ROOT_DB_USER_PASSWORD: "${ROOT_DB_USER_PASSWORD}"
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  openbao:
    container_name: openbao
    image: openbao/openbao:latest
    environment:
      BAO_DEV_ROOT_TOKEN_ID: "${BAO_DEV_ROOT_TOKEN_ID}"
      BAO_ADDR: "http://127.0.0.1:8200"
      BAO_TOKEN: "${BAO_DEV_ROOT_TOKEN_ID}"
    ports:
      - "8200:8200"
    command: server -dev
    healthcheck:
      test: ["CMD-SHELL", "bao status"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
  
  client:
    container_name: client
    build: .
    environment:
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: "${BAO_DEV_ROOT_TOKEN_ID}"
      ROOT_DB_USER_PASSWORD: "${ROOT_DB_USER_PASSWORD}"
    volumes:
      - ./openbao-init.sh:/usr/local/bin/openbao-init.sh:Z
    entrypoint: ["/bin/sh", "/usr/local/bin/openbao-init.sh"]
    init: true
    depends_on:
      openbao:
        condition: service_healthy